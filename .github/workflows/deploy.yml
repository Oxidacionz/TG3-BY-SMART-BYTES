# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ['main']

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets the GITHUB_TOKEN permissions to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment
concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v5
        
      - name: 🟢 Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20 # O la versión que uses (LTS recomendado)
          cache: 'pnpm' # 💡 CLAVE: Usar 'pnpm' para el caché
          
      # 🔑 CLAVE: Configurar pnpm
      - name: 🔧 Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8 # Usar la versión específica o omitir para la última
          run_install: false # Haremos la instalación en el siguiente paso

      - name: 📦 Install dependencies with pnpm
        # 🔑 CLAVE: Cambiar 'npm ci' por 'pnpm install --frozen-lockfile'
        run: pnpm install --frozen-lockfile

      - name: 🔨 Build project (Vite)
        # Esto asume que tienes un script 'build' en tu package.json que usa Vite
        run: pnpm run build
        
      - name: ⚙️ Setup Pages
        uses: actions/configure-pages@v5
        
      - name: ⬆️ Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: './dist' 
          
      - name: 🚀 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4