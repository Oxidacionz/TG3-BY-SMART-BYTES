# Archivo: .github/workflows/deploy.yml

name: Deploy static content to Pages

on:
  # Se ejecuta en cada push a la rama 'main'
  push:
    branches: ['main']

  # Permite ejecutar el workflow manualmente
  workflow_dispatch:

# Otorga los permisos necesarios para el despliegue en GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Asegura que solo se ejecute un despliegue a la vez
concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v5
        
      - name: 🟢 Set up Node.js
        # Configura Node.js y el caché para pnpm
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm' 

      # 🔑 PASO CORREGIDO Y ESENCIAL: Instalar pnpm
      - name: 🔧 Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8 # Usar una versión específica o la última
          run_install: false # Haremos la instalación en el siguiente paso

      - name: 📦 Install dependencies with pnpm
        # Ahora 'pnpm' está disponible y realiza la instalación
        run: pnpm install --frozen-lockfile

      - name: 🔨 Build project (Vite)
        # Ejecuta el script 'build' (Asegúrate de configurar la propiedad 'base' en vite.config.js)
        run: pnpm run build
        
      - name: ⚙️ Setup Pages
        uses: actions/configure-pages@v5
        
      - name: ⬆️ Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          # Sube la carpeta de salida de Vite
          path: './dist' 
          
      - name: 🚀 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4