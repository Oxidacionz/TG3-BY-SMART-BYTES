# Archivo: .github/workflows/deploy.yml

name: Deploy static content to Pages

on:
  # Se ejecuta en cada push a la rama 'main'
  push:
    branches: ['main']

  # Permite ejecutar el workflow manualmente
  workflow_dispatch:

# Otorga los permisos necesarios para el despliegue en GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Asegura que solo se ejecute un despliegue a la vez
concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v5
        
      - name: 🟢 Set up Node.js
        # Configura Node.js y el caché para npm (default)
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm' # 🔑 CLAVE: Volvemos a usar 'npm' para el caché

      - name: 📦 Install dependencies with npm
        # 🔑 CLAVE: Usamos 'npm ci' que es el equivalente de instalación limpia
        run: npm ci

      - name: 🔨 Build project (Vite)
        # Ejecuta el script 'build'
        run: npm run build
        
      - name: ⚙️ Setup Pages
        uses: actions/configure-pages@v5
        
      - name: ⬆️ Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          # Sube la carpeta de salida de Vite
          path: './dist' 
          
      - name: 🚀 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4